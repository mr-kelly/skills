<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelly Digital Human</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./demo-visuals.css">
      <link rel="stylesheet" href="./setup-gate.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" id="appSidebar">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">DH</div>
          <div class="brand-copy">
            <div class="brand-title">Kelly Digital Human</div>
            <div id="sync-status" class="brand-subtitle">Loading</div>
          </div>
          <button
            id="sidebarToggle"
            class="sidebar-toggle"
            type="button"
            aria-controls="appSidebar"
            aria-expanded="true"
            title="Toggle sidebar"
            aria-label="Toggle sidebar"
          >
            <span class="sidebar-toggle-icon" aria-hidden="true"></span>
          </button>
        </div>

        <div class="search sidebar-search">
          <input id="search" type="search" placeholder="Search" aria-label="Search">
        </div>

        <section class="human-work" aria-labelledby="humanWorkTitle">
          <div class="human-work-eyebrow" data-i18n="attention">Need attention</div>
          <div id="humanWorkTitle" class="human-work-title" data-i18n="humanWorkTitle">What needs your attention</div>
          <a class="human-work-primary" href="#/qa" data-route="qa" title="Review launch blockers">
            <span>
              <strong id="count-review">0</strong>
              <span data-i18n="needReview">checks need review</span>
            </span>
          </a>
          <div class="human-work-secondary">
            <a href="#/qa" data-route="qa" title="Open fixed issues">
              <strong id="count-fix">0</strong>
              <span data-i18n="fixOpen">fix items</span>
            </a>
            <a href="#/vendors" data-route="vendors" title="Provider routes">
              <strong id="count-routes">0</strong>
              <span data-i18n="providerRoutes">routes</span>
            </a>
          </div>
        </section>

        <div class="sidebar-separator"></div>
        <nav class="filters" aria-label="Views">
          <a href="#/overview" data-route="overview" data-i18n="overview" title="Readiness dashboard">Overview</a>
          <a href="#/qa" data-route="qa" data-i18n="review" title="QA review queue">Review Queue</a>
          <a href="#/studio" data-route="studio" data-i18n="studio" title="Multimodal stream studio">Studio</a>
          <a href="#/vendors" data-route="vendors" data-i18n="vendors" title="Vendor routes and architecture">Vendors</a>
        </nav>

        <div class="sidebar-separator"></div>
        <nav class="status-filters" id="statusFilters" aria-label="Workflow">
          <button type="button" class="status-filter" data-status="all" data-i18n="all">All</button>
          <button type="button" class="status-filter" data-status="needs_review" data-i18n="needsReview">Needs Review</button>
          <button type="button" class="status-filter" data-status="approved" data-i18n="approved">Approved</button>
          <button type="button" class="status-filter" data-status="changes_requested" data-i18n="changesRequested">Changes Requested</button>
          <button type="button" class="status-filter" data-status="blocked" data-i18n="blocked">Blocked</button>
        </nav>

        <div class="sidebar-footer">
          <a href="#/settings" data-route="settings" class="settings-link" data-i18n="settings">Help & Settings</a>
          <label for="language" data-i18n="language">Language</label>
          <select id="language">
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </aside>

      <main class="main">
        <div class="mobile-topbar">
          <button id="mobileSidebarToggle" class="mobile-sidebar-toggle" type="button" aria-controls="appSidebar" aria-label="Open sidebar" title="Open sidebar">
            <span class="sidebar-toggle-icon" aria-hidden="true"></span>
          </button>
          <div class="mobile-topbar-copy">
            <div id="mobileViewTitle" class="mobile-view-title">Kelly Digital Human</div>
            <div id="mobileViewMeta" class="mobile-view-meta">Loading</div>
          </div>
          <button id="mobileRefresh" class="mobile-refresh-button" type="button" title="Refresh" aria-label="Refresh">↻</button>
        </div>

        <header class="topbar">
          <div>
            <h1 id="page-title">Overview</h1>
            <p id="page-subtitle" class="muted"></p>
          </div>
          <div class="topbar-actions">
            <button id="refresh" type="button" title="Refresh" aria-label="Refresh">Refresh</button>
          </div>
        </header>

        <section id="content" class="content"></section>
      </main>
    </div>
    <div id="sidebarScrim" class="sidebar-scrim" hidden></div>
    <script src="./demo-visuals.js"></script>
    <script type="module" src="./setup-gate.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
