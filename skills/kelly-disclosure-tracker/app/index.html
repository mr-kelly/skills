<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cross-Entity Disclosure Tracker</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./accent-theme.css">
      <link rel="stylesheet" href="./setup-gate.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" id="appSidebar">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">D</div>
          <div class="brand-copy">
            <div class="brand-title">Disclosure Tracker</div>
            <div id="sync-status" class="brand-subtitle">Loading</div>
          </div>
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-controls="appSidebar" aria-expanded="true" title="Toggle sidebar" aria-label="Toggle sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
        </div>
        <div class="search sidebar-search">
          <input id="search" type="search" placeholder="Search" aria-label="Search">
        </div>
        <section class="human-work" aria-labelledby="humanWorkTitle">
          <div class="human-work-eyebrow" data-i18n="attention">Portfolio</div>
          <div id="humanWorkTitle" class="human-work-title" data-i18n="humanWorkTitle">Needs a decision</div>
          <a class="human-work-primary" href="#/vehicles?filter=needs_review" data-route="needs_review">
            <span>
              <strong id="count-needs-review">0</strong>
              <span data-i18n="needsDecision">need a note or decision</span>
            </span>
          </a>
          <div class="human-work-secondary">
            <a href="#/vehicles?filter=blocked" data-route="blocked">
              <strong id="count-blocked">0</strong>
              <span data-i18n="blocked">blocked</span>
            </a>
            <a href="#/vehicles?filter=ready" data-route="ready">
              <strong id="count-ready">0</strong>
              <span data-i18n="ready">ready</span>
            </a>
          </div>
        </section>
        <div class="sidebar-separator"></div>
        <nav class="filters" aria-label="Main">
          <a href="#/vehicles" data-route="vehicles" data-i18n="allVehicles">All Vehicles</a>
          <a href="#/vehicles?filter=needs_review" data-route="needs_review" data-i18n="needsReview">Needs Review</a>
          <a href="#/vehicles?filter=changes_requested" data-route="changes_requested" data-i18n="awaitingSource">Awaiting Source</a>
          <a href="#/flagged" data-route="flagged" data-i18n="flagged">Flagged</a>
          <a href="#/vehicles?filter=ready" data-route="ready" data-i18n="readyFilter">Ready</a>
          <a href="#/settings" data-route="settings" data-i18n="settings">Help &amp; Settings</a>
        </nav>
        <div class="sidebar-footer">
          <label for="language" data-i18n="language">Language</label>
          <select id="language">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </aside>
      <main class="main">
        <div class="mobile-topbar">
          <button id="mobileSidebarToggle" class="mobile-sidebar-toggle" type="button" aria-controls="appSidebar" aria-label="Open sidebar" title="Open sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
          <div class="mobile-topbar-copy">
            <div id="mobileViewTitle" class="mobile-view-title">Disclosure Tracker</div>
            <div id="mobileViewMeta" class="mobile-view-meta">Loading</div>
          </div>
          <button id="mobileRefresh" class="mobile-refresh-button" type="button" title="Refresh" aria-label="Refresh">↻</button>
        </div>
        <header class="topbar">
          <div>
            <h1 id="page-title">Vehicles</h1>
            <p id="page-subtitle" class="muted"></p>
          </div>
          <div class="topbar-actions">
            <button id="refresh" type="button" title="Refresh" aria-label="Refresh">Refresh</button>
          </div>
        </header>
        <section id="content" class="content"></section>
      </main>
    </div>
    <div id="sidebarScrim" class="sidebar-scrim" hidden></div>
    <script type="module" src="./setup-gate.js"></script>
    <script type="module" src="./app.js"></script>
    <script type="module" src="./accent-theme.js"></script>
  </body>
</html>
