<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelly Content</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./accent-theme.css">
  </head>
  <body>
    <aside class="sidebar" id="appSidebar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">CF</div>
        <div class="brand-copy">
          <h1>Kelly Content</h1>
          <p id="batchMeta">No batch loaded</p>
        </div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-controls="appSidebar" aria-expanded="true" title="Toggle sidebar" aria-label="Toggle sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
      </div>
      <nav id="stageNav" class="stageNav" aria-label="Content stages"></nav>
      <section class="settings">
        <h2>Workspace</h2>
        <p id="settingsText">Local review only. Publishing is disabled.</p>
        <label class="language-control" for="languageSelect">
          <span>Language</span>
          <select id="languageSelect" aria-label="Language">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="zh-CN">中文</option>
          </select>
        </label>
        <button id="refreshBtn" title="Refresh batch">Refresh</button>
      </section>
    </aside>

    <main>
      <button id="mobileSidebarToggle" class="mobile-sidebar-toggle" type="button" aria-controls="appSidebar" aria-label="Open sidebar" title="Open sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
      <section class="content-title">
        <h2 id="pageTitle">Content Repository</h2>
        <p id="lockText"></p>
      </section>

      <section id="stagePanel" class="stagePanel empty">
        <p>Generate a content batch, then the repository will appear here.</p>
      </section>
    </main>
    <div id="sidebarScrim" class="sidebar-scrim" hidden></div>

    <script type="module" src="./app.js"></script>
    <script type="module" src="./accent-theme.js"></script>
  </body>
</html>
