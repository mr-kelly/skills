<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelly Social</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./accent-theme.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" id="appSidebar">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">@</div>
          <div class="brand-copy">
            <div class="brand-title">Kelly Social</div>
            <div id="sync-status" class="brand-subtitle">Loading</div>
          </div>
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-controls="appSidebar" aria-expanded="true" title="Toggle sidebar" aria-label="Toggle sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
        </div>
        <div class="search sidebar-search">
          <input id="search" type="search" placeholder="Search" aria-label="Search">
        </div>
        <section class="human-work" aria-labelledby="humanWorkTitle">
          <div class="human-work-eyebrow" data-i18n="attention">Need attention</div>
          <div id="humanWorkTitle" class="human-work-title" data-i18n="humanWorkTitle">What needs your attention</div>
          <a class="human-work-primary" href="#/compose" data-route="compose">
            <span>
              <strong id="count-review">0</strong>
              <span data-i18n="needsReviewCount">need review</span>
            </span>
          </a>
          <div class="human-work-secondary">
            <a href="#/accounts" data-route="accounts">
              <strong id="count-stale">0</strong>
              <span data-i18n="needCollection">need fresh collection</span>
            </a>
            <a href="#/engagement" data-route="engagement">
              <strong id="count-engagement">0</strong>
              <span data-i18n="engagement">Engagement</span>
            </a>
            <a href="#/timeline" data-route="timeline">
              <strong id="count-posts">0</strong>
              <span data-i18n="postsTracked">posts tracked</span>
            </a>
            <a href="#/accounts" data-route="accounts">
              <strong id="count-accounts">0</strong>
              <span data-i18n="configured">configured</span>
            </a>
          </div>
        </section>
        <div class="sidebar-separator"></div>
        <nav class="filters" aria-label="Main">
          <div class="nav-group-label" data-i18n="publishingDesk">Publishing desk</div>
          <a href="#/calendar" data-route="calendar" data-i18n="calendar">Calendar</a>
          <a href="#/compose" data-route="compose" data-i18n="compose">Compose</a>
          <a href="#/shorts" data-route="shorts" data-i18n="shorts">Shorts</a>
          <a href="#/engagement" data-route="engagement" data-i18n="engagement">Engagement</a>
          <a href="#/crisis" data-route="crisis" data-i18n="crisis">Crisis</a>
          <div class="nav-group-label" data-i18n="attention">Need attention</div>
          <a href="#/overview" data-route="overview" data-i18n="overview">Overview</a>
          <a href="#/timeline" data-route="timeline" data-i18n="timeline">Timeline</a>
          <a href="#/accounts" data-route="accounts" data-i18n="accounts">Accounts</a>
          <a href="#/settings" data-route="settings" data-i18n="settings">Help & Settings</a>
        </nav>
        <div class="sidebar-footer">
          <label for="language" data-i18n="language">Language</label>
          <select id="language">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </aside>
      <main class="main">
        <div class="mobile-topbar">
          <button id="mobileSidebarToggle" class="mobile-sidebar-toggle" type="button" aria-controls="appSidebar" aria-label="Open sidebar" title="Open sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
          <div class="mobile-topbar-copy">
            <div id="mobileViewTitle" class="mobile-view-title">Kelly Social</div>
            <div id="mobileViewMeta" class="mobile-view-meta">Loading</div>
          </div>
          <button id="mobileRefresh" class="mobile-refresh-button" type="button" title="Refresh" aria-label="Refresh">↻</button>
        </div>
        <header class="topbar">
          <div>
            <h1 id="page-title">Overview</h1>
            <p id="page-subtitle" class="muted"></p>
          </div>
          <div class="topbar-actions">
            <button id="refresh" type="button" title="Refresh" aria-label="Refresh">Refresh</button>
          </div>
        </header>
        <section id="content" class="content"></section>
      </main>
    </div>
    <div id="sidebarScrim" class="sidebar-scrim" hidden></div>
    <script type="module" src="./app.js"></script>
    <script type="module" src="./accent-theme.js"></script>
  </body>
</html>
