<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelly Scale PPTX</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="./demo-visuals.css">
    <link rel="stylesheet" href="./accent-theme.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="appSidebar">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">PX</div>
          <div class="brand-copy">
            <div class="brand-title" data-i18n="appName">Kelly Scale PPTX</div>
            <div class="brand-subtitle" data-i18n="appSubtitle">Courseware factory</div>
          </div>
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-controls="appSidebar" aria-expanded="true" title="Toggle sidebar">
            <span class="sidebar-toggle-icon" aria-hidden="true"></span>
          </button>
        </div>
        <section class="human-work">
          <div class="attention-label" data-i18n="attentionPrimary">Need a slide decision</div>
          <div class="attention-count" id="attentionCount">0</div>
          <div class="attention-subgrid">
            <span><b id="approvedCount">0</b><small data-i18n="approved">Approved</small></span>
            <span><b id="readyCount">0</b><small data-i18n="readyForAgent">Ready for agent next</small></span>
          </div>
        </section>
        <nav class="filters" aria-label="Workflow">
          <a href="#/overview" data-route="overview" data-i18n="overview">Overview</a>
          <a href="#/projects" data-route="projects" data-i18n="projects">Projects</a>
          <a href="#/decks" data-route="decks" data-i18n="decks">Decks</a>
          <a href="#/slides" data-route="slides" data-i18n="slideCards">Slide cards</a>
          <a href="#/review" data-route="review" data-i18n="review">Review</a>
          <a href="#/style" data-route="style" data-i18n="styleSystem">Style system</a>
          <a href="#/exports" data-route="exports" data-i18n="exports">Exports</a>
        </nav>
        <div class="sidebar-footer">
          <button id="settingsBtn" class="text-button" type="button" data-i18n="settings">Settings</button>
          <select id="languageSelect" aria-label="Language">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </aside>
      <main class="main">
        <div class="mobile-topbar">
          <button id="mobileSidebarToggle" class="mobile-sidebar-toggle" type="button" aria-label="Open sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
          <div>
            <div id="mobileViewTitle" class="mobile-view-title">Kelly Scale PPTX</div>
            <div id="mobileViewMeta" class="mobile-view-meta"></div>
          </div>
          <button id="mobileSettingsBtn" class="icon-text" type="button" data-i18n="settings">Settings</button>
        </div>
        <header class="topbar-work">
          <div>
            <h1 id="pageTitle">Kelly Scale PPTX</h1>
            <p id="pageSubtitle"></p>
          </div>
          <input id="searchInput" type="search" placeholder="Search projects, decks, slides" />
        </header>
        <section class="content">
          <div class="list-panel" id="listPanel"></div>
          <aside class="detail-panel" id="detailPanel"></aside>
        </section>
      </main>
    </div>
    <div id="sidebarScrim" class="sidebar-scrim" hidden></div>
    <dialog id="settingsDialog">
      <form method="dialog" class="dialog-card">
        <button class="dialog-close" value="close" aria-label="Close">×</button>
        <div id="settingsContent"></div>
      </form>
    </dialog>
    <script src="./demo-visuals.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="./accent-theme.js"></script>
  </body>
</html>
