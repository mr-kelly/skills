<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kelly Drama</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">KD</div>
          <div>
            <div class="brand-title">Kelly Drama</div>
            <div class="brand-subtitle">短剧工作台</div>
          </div>
        </div>

        <section class="project-switcher" aria-label="Drama switcher">
          <label for="projectSelect">项目</label>
          <select id="projectSelect"></select>
          <div id="projectSwitchMeta" class="switch-meta"></div>
        </section>

        <section class="quick-stats" aria-label="Project status">
          <button data-view="tasks" title="查看需要处理的任务">
            <span id="attentionNeeds">0</span>
            <small>待处理</small>
          </button>
          <button data-view="episodes" title="查看待补分镜（在剧集内）">
            <span id="attentionShots">0</span>
            <small>分镜</small>
          </button>
          <button data-view="characters" title="查看人物三视图缺口">
            <span id="attentionViews">0</span>
            <small>人物</small>
          </button>
        </section>

        <div class="separator"></div>

        <nav class="nav" id="nav">
          <button class="active" data-view="overview" title="查看短剧背景、世界规则和项目总览">总览</button>
          <button data-view="characters" title="维护人物库、演员设定、三视图">人物</button>
          <button data-view="relationships" title="维护人物关系、权力变化和证据">关系</button>
          <button data-view="episodes" title="浏览剧集表格并进入单集剧本详情">剧集</button>
          <button data-view="tasks" title="查看 AI 或人工待办">审批</button>
        </nav>

        <div class="settings-dock">
          <button id="settingsButton" class="settings-button" title="打开设置和本地文件信息">
            <span>设置</span>
            <small>图像 API / 文件</small>
          </button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <div class="project-title" id="projectTitle">加载中</div>
            <div class="project-meta" id="projectMeta">本地短剧项目</div>
          </div>
          <div class="topbar-actions">
            <input id="searchInput" placeholder="搜索" />
            <button id="newItemButton" title="在当前视图中新建一项" aria-label="新建">+</button>
          </div>
        </header>

        <div id="lockBanner" class="lock-banner hidden">本地项目文件正在被 agent 使用，暂时只读。</div>

        <section class="workspace">
          <div class="list-panel">
            <div class="panel-head">
              <div>
                <h2 id="viewTitle">总览</h2>
                <p id="viewSubtitle">项目健康度与创作入口</p>
              </div>
              <span id="itemCount" class="count-pill">0</span>
            </div>
            <div id="list" class="item-list"></div>
          </div>

          <aside class="detail-panel">
            <div id="detail" class="detail"></div>
          </aside>
        </section>
      </main>
    </div>
    <div id="settingsModal" class="modal-backdrop hidden" aria-hidden="true">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="modal-head">
          <div>
            <div id="settingsTitle" class="modal-title">设置</div>
            <div class="modal-subtitle" id="settingsSubtitle">短剧生成与本地项目配置</div>
          </div>
          <button id="closeSettings" class="modal-close" aria-label="关闭设置">关闭</button>
        </div>
        <nav class="modal-tabs" aria-label="设置标签">
          <button class="active" data-settings-tab="image">图像 API</button>
          <button data-settings-tab="files">文件</button>
        </nav>
        <div class="modal-body">
          <section class="settings-panel active" data-settings-panel="image">
            <h2>图像 API</h2>
            <p class="muted">用于生成分镜图。API Key 只显示配置状态，不会在界面里回显完整密钥。</p>
            <div id="imageSettingsMount"></div>
          </section>
          <section class="settings-panel" data-settings-panel="files">
            <h2>本地文件</h2>
            <div class="settings-card">
              <div class="settings-row">
                <span>项目文件</span>
                <code id="projectPath">loading...</code>
              </div>
            </div>
          </section>
        </div>
      </section>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
