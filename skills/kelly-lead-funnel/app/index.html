<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deal Sourcing Funnel</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./accent-theme.css">
      <link rel="stylesheet" href="./setup-gate.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" id="appSidebar">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">DF</div>
          <div class="brand-copy">
            <div class="brand-title">Deal Sourcing Funnel</div>
            <div id="sync-status" class="brand-subtitle">Loading</div>
          </div>
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-controls="appSidebar" aria-expanded="true" title="Toggle sidebar" aria-label="Toggle sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
        </div>
        <div class="search sidebar-search">
          <input id="search" type="search" placeholder="Search" aria-label="Search">
        </div>
        <section class="human-work" aria-labelledby="humanWorkTitle">
          <div class="human-work-eyebrow" data-i18n="attention">Pipeline</div>
          <div id="humanWorkTitle" class="human-work-title" data-i18n="humanWorkTitle">Funnel at a glance</div>
          <a class="human-work-primary" href="#/board/new" data-route="new">
            <span>
              <strong id="new-count">0</strong>
              <span data-i18n="needsAction">Need a note or decision</span>
            </span>
          </a>
          <div class="human-work-secondary">
            <a href="#/board/scored" data-route="scored">
              <strong id="ready-count">0</strong>
              <span data-i18n="readyForNext">Ready for agent next</span>
            </a>
            <a href="#/board/rejected" data-route="rejected">
              <strong id="rejected-count">0</strong>
              <span data-i18n="blocked">Rejected</span>
            </a>
          </div>
        </section>
        <div class="sidebar-separator"></div>
        <nav class="filters" aria-label="Main">
          <a href="#/board" data-route="board" data-i18n="board">Board</a>
          <a href="#/board/new" data-route="new"><span data-i18n-stage="new">New</span></a>
          <a href="#/board/data_verified" data-route="data_verified"><span data-i18n-stage="data_verified">Data-Verified</span></a>
          <a href="#/board/scored" data-route="scored"><span data-i18n-stage="scored">Scored</span></a>
          <a href="#/board/term_sheet_ready" data-route="term_sheet_ready"><span data-i18n-stage="term_sheet_ready">Term-Sheet-Ready</span></a>
          <a href="#/board/rejected" data-route="rejected"><span data-i18n-stage="rejected">Rejected</span></a>
          <a href="#/settings" data-route="settings" data-i18n="settings">Help & Settings</a>
        </nav>
        <div class="sidebar-footer">
          <label for="language" data-i18n="language">Language</label>
          <select id="language">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </aside>
      <main class="main">
        <div class="mobile-topbar">
          <button id="mobileSidebarToggle" class="mobile-sidebar-toggle" type="button" aria-controls="appSidebar" aria-label="Open sidebar" title="Open sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
          <div class="mobile-topbar-copy">
            <div id="mobileViewTitle" class="mobile-view-title">Deal Sourcing Funnel</div>
            <div id="mobileViewMeta" class="mobile-view-meta">Loading</div>
          </div>
          <button id="mobileRefresh" class="mobile-refresh-button" type="button" title="Refresh" aria-label="Refresh">↻</button>
        </div>
        <header class="topbar">
          <div>
            <h1 id="page-title">Board</h1>
            <p id="page-subtitle" class="muted"></p>
          </div>
          <div class="topbar-actions">
            <button id="refresh" type="button" title="Refresh" aria-label="Refresh">Refresh</button>
          </div>
        </header>
        <section id="content" class="content"></section>
      </main>
    </div>
    <div id="sidebarScrim" class="sidebar-scrim" hidden></div>
    <script type="module" src="./setup-gate.js"></script>
    <script type="module" src="./app.js"></script>
    <script type="module" src="./accent-theme.js"></script>
  </body>
</html>
