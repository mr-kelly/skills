<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelly Support</title>
    <link rel="stylesheet" href="/styles/layers.css" />
    <link rel="stylesheet" href="/styles/shell.css" />
    <link rel="stylesheet" href="/styles/workflow.css" />
    <link rel="stylesheet" href="./demo-visuals.css">
    <link rel="stylesheet" href="./accent-theme.css">
      <link rel="stylesheet" href="./setup-gate.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" id="appSidebar">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">CS</div>
          <div class="brand-copy">
            <div class="brand-title">Kelly Support</div>
            <div id="sync-status" class="brand-subtitle">Loading</div>
          </div>
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-controls="appSidebar" aria-expanded="true" title="Toggle sidebar" aria-label="Toggle sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
        </div>
        <div class="search sidebar-search">
          <input id="search" type="search" placeholder="Search" aria-label="Search">
        </div>
        <section class="human-work" aria-labelledby="humanWorkTitle">
          <div class="human-work-eyebrow" data-i18n="attention">Need attention</div>
          <div id="humanWorkTitle" class="human-work-title" data-i18n="humanWorkTitle">What needs your attention</div>
          <a class="human-work-primary" href="#/tickets" data-route="tickets">
            <span>
              <strong id="count-approvals">0</strong>
              <span data-i18n="awaitingApproval">await your approval</span>
            </span>
          </a>
          <div class="human-work-secondary">
            <a href="#/sla">
              <strong id="count-sla">0</strong>
              <span data-i18n="breachingSla">breaching SLA</span>
            </a>
            <a href="#/tickets" data-route="tickets">
              <strong id="count-blocked">0</strong>
              <span data-i18n="gateBlocked">blocked by gate</span>
            </a>
          </div>
        </section>
        <div class="sidebar-separator"></div>
        <nav class="filters" aria-label="Workflow">
          <a href="#/tickets" data-filter="all" data-i18n="allTickets">All</a>
          <a href="#/tickets/needs_review" data-filter="needs_review" data-i18n="needsReviewFilter">Needs Review</a>
          <a href="#/tickets/changes_requested" data-filter="changes_requested" data-i18n="changesRequestedFilter">Changes Requested</a>
          <a href="#/tickets/approved" data-filter="approved" data-i18n="approvedFilter">Approved</a>
          <a href="#/tickets/done" data-filter="done" data-i18n="doneFilter">Done</a>
          <a href="#/tickets/blocked" data-filter="blocked" data-i18n="blockedFilter">Blocked</a>
        </nav>
        <div class="sidebar-separator"></div>
        <nav class="filters" aria-label="Main">
          <a href="#/overview" data-route="overview" data-i18n="overview">Overview</a>
          <a href="#/tickets" data-route="tickets" data-i18n="tickets">Tickets</a>
          <a href="#/knowledge" data-route="knowledge" data-i18n="knowledge">Knowledge</a>
          <a href="#/sla" data-route="sla" data-i18n="sla">SLA &amp; CSAT</a>
          <a href="#/settings" data-route="settings" data-i18n="settings">Help &amp; Settings</a>
        </nav>
        <div class="sidebar-footer">
          <label for="language" data-i18n="language">Language</label>
          <select id="language">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </aside>
      <main class="main">
        <div class="mobile-topbar">
          <button id="mobileSidebarToggle" class="mobile-sidebar-toggle" type="button" aria-controls="appSidebar" aria-label="Open sidebar" title="Open sidebar"><span class="sidebar-toggle-icon" aria-hidden="true"></span></button>
          <div class="mobile-topbar-copy">
            <div id="mobileViewTitle" class="mobile-view-title">Kelly Support</div>
            <div id="mobileViewMeta" class="mobile-view-meta">Loading</div>
          </div>
          <button id="mobileRefresh" class="mobile-refresh-button" type="button" title="Refresh" aria-label="Refresh">↻</button>
        </div>
        <header class="topbar">
          <div>
            <h1 id="page-title">Overview</h1>
            <p id="page-subtitle" class="muted"></p>
          </div>
          <div class="topbar-actions">
            <button id="refresh" type="button" title="Refresh" aria-label="Refresh">Refresh</button>
          </div>
        </header>
        <div id="notice" class="notice" hidden></div>
        <section id="content" class="content"></section>
      </main>
    </div>
    <div id="sidebarScrim" class="sidebar-scrim" hidden></div>
    <script src="./demo-visuals.js"></script>
    <script type="module" src="./setup-gate.js"></script>
    <script type="module" src="./app.js"></script>
    <script type="module" src="./accent-theme.js"></script>
  </body>
</html>
